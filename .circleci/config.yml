# Ruby CircleCI 2.0 configuration file
#
# Check https://circleci.com/docs/2.0/language-ruby/ for more details
#
version: 2.1

orbs:
  terraform: circleci/terraform@3.1
  helm: circleci/helm@2.0.1

executors:
  terraform:
    docker:
      - image: hashicorp/terraform:1.15.2

jobs:
  lint_helm_chart:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - helm/install-helm-client:
          version: 'v3.10.2'
      - run: helm lint "helm/automation-calculator" --strict

  validate_development_tf_cloud_env:
    executor: terraform
    steps:
      - checkout
      - terraform/fmt:
          path: ./terraform/env/development/tf_cloud
      - terraform/validate:
          path: ./terraform/env/development/tf_cloud

  validate_development_aws_base_cluster_layer:
    executor: terraform
    steps:
      - checkout
      - terraform/fmt:
          path: ./terraform/env/development/aws/us-west-1/base-cluster-layer
      - terraform/validate:
          path: ./terraform/env/development/aws/us-west-1/base-cluster-layer

  validate_development_aws_cluster_addons_layer:
    executor: terraform
    steps:
      - checkout
      - terraform/fmt:
          path: ./terraform/env/development/aws/us-west-1/cluster-addons-layer
      - terraform/validate:
          path: ./terraform/env/development/aws/us-west-1/
  
  validate_staging_tf_cloud_env:
    executor: terraform
    steps:
      - checkout
      - terraform/fmt:
          path: ./terraform/env/staging/tf_cloud
      - terraform/validate:
          path: ./terraform/env/staging/tf_cloud

  validate_staging_aws_base_cluster_layer:
    executor: terraform
    steps:
      - checkout
      - terraform/fmt:
          path: ./terraform/env/staging/aws/us-west-1/base-cluster-layer
      - terraform/validate:
          path: ./terraform/env/staging/aws/us-west-1/base-cluster-layer

  validate_staging_aws_cluster_addons_layer:
    executor: terraform
    steps:
      - checkout
      - terraform/fmt:
          path: ./terraform/env/staging/aws/us-west-1/cluster-addons-layer
      - terraform/validate:
          path: ./terraform/env/staging/aws/us-west-1/cluster-addons-layer

  validate_production_tf_cloud_env:
    executor: terraform
    steps:
      - checkout
      - terraform/fmt:
          path: ./terraform/env/production/tf_cloud
      - terraform/validate:
          path: ./terraform/env/production/tf_cloud

  validate_production_aws_base_cluster_layer:
    executor: terraform
    steps:
      - checkout
      - terraform/fmt:
          path: ./terraform/env/production/aws/us-west-1/base-cluster-layer
      - terraform/validate:
          path: ./terraform/env/production/aws/us-west-1/base-cluster-layer

  validate_production_aws_cluster_addons_layer:
    executor: terraform
    steps:
      - checkout
      - terraform/fmt:
          path: ./terraform/env/production/aws/us-west-1/cluster-addons-layer
      - terraform/validate:
          path: ./terraform/env/production/aws/us-west-1/cluster-addons-layer

  validate_tf_cloud_workspaces_module:
    executor: terraform
    steps:
      - checkout
      - terraform/fmt:
          path: ./terraform/modules/tf_cloud/tf_cloud_workspaces
      - terraform/validate:
          path: ./terraform/modules/tf_cloud/tf_cloud_workspaces

  validate_base_cluster_layer_module:
    executor: terraform
    steps:
      - checkout
      - terraform/fmt:
          path: ./terraform/modules/aws/base-cluster-layer
      - terraform/validate:
          path: ./terraform/modules/aws/base-cluster-layer
  
  validate_cluster_addons_module:
    executor: terraform
    steps:
      - checkout
      - terraform/fmt:
          path: ./terraform/modules/aws/cluster-addons-layer
      - terraform/validate:
          path: ./terraform/modules/aws/cluster-addons-layer

  validate_main_rails_app_module:
    executor: terraform
    steps:
      - checkout
      - terraform/fmt:
          path: ./terraform/modules/aws/main_rails_app
      - terraform/validate:
          path: ./terraform/modules/aws/main_rails_app

  validate_networking_module:
    executor: terraform
    steps:
      - checkout
      - terraform/fmt:
          path: ./terraform/modules/aws/networking
      - terraform/validate:
          path: ./terraform/modules/aws/networking

  validate_route53_domain_module:
    executor: terraform
    steps:
      - checkout
      - terraform/fmt:
          path: ./terraform/modules/aws/route53-domain
      - terraform/validate:
          path: ./terraform/modules/aws/route53-domain

  validate_production_aws_route53_domains:
    executor: terraform
    steps:
      - checkout
      - terraform/fmt:
          path: ./terraform/env/production/aws/us-east-1/route53-domains
      - terraform/validate:
          path: ./terraform/env/production/aws/us-east-1/route53-domains

  validate_app_docker_image_versions:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - run:
          name: Validate app Docker image versions exist on Docker Hub
          command: |
            git fetch origin main
            CHANGED_VERSIONS=$(git diff origin/main...HEAD -- terraform/env/*/aws/us-west-1/cluster-addons-layer/terraform.tfvars | grep '^+app_version' | grep -oP '"\K[^"]+' | sort -u)
            if [ -z "${CHANGED_VERSIONS}" ]; then
              echo "No app_version changes detected, skipping Docker Hub validation"
              exit 0
            fi
            IMAGE_REPO="automationcalculationsci/automation-calculator"
            FAILED=0
            for VERSION in $CHANGED_VERSIONS; do
              HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://hub.docker.com/v2/repositories/${IMAGE_REPO}/tags/${VERSION}/")
              if [ "${HTTP_STATUS}" = "200" ]; then
                echo "OK: ${IMAGE_REPO}:${VERSION}"
              else
                echo "MISSING: ${IMAGE_REPO}:${VERSION} (HTTP ${HTTP_STATUS})"
                FAILED=1
              fi
            done
            exit ${FAILED}

workflows:
  validate:
    jobs:
      - lint_helm_chart      
      - validate_base_cluster_layer_module
      - validate_cluster_addons_module
      - validate_tf_cloud_workspaces_module
      - validate_development_aws_base_cluster_layer
      - validate_development_aws_cluster_addons_layer
      - validate_development_tf_cloud_env
      - validate_staging_tf_cloud_env
      - validate_staging_aws_base_cluster_layer
      - validate_staging_aws_cluster_addons_layer
      - validate_production_tf_cloud_env
      - validate_production_aws_base_cluster_layer
      - validate_production_aws_cluster_addons_layer
      - validate_main_rails_app_module
      - validate_networking_module
      - validate_route53_domain_module
      - validate_production_aws_route53_domains
      - validate_app_docker_image_versions:
          filters:
            branches:
              ignore: main
